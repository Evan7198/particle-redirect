    <!-- Discord embed accent color (pink) -->
    <meta name="theme-color" content="#ff4b91">

    <style>
        :root {
            --primary-pink: #ff7eb9;
            --secondary-pink: #ff4b91;
            --dark-bg: #0d0d0d;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Fullscreen GIF Background */
        #video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.4) blur(4px);
            object-fit: cover;
        }

        /* Glassmorphism Card */
        .container {
            text-align: center;
            padding: 3.5rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px 0 rgba(255, 126, 185, 0.25);
            max-width: 420px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        /* Pulsing Logo */
        .logo {
            width: 130px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px var(--primary-pink));
            animation: pulse 2.5s infinite ease-in-out;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #fff, var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        /* Button Styling */
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(45deg, var(--primary-pink), var(--secondary-pink));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 75, 145, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 75, 145, 0.6);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--primary-pink)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px var(--secondary-pink)); }
        }

    </style>
</head>
<body>

    <img src="media/banner-video.gif" alt="" id="video-bg">

    <div class="container">
        <img src="media/logo.png" alt="Particle Logo" class="logo">
        
        <h1>PARTICLE</h1>
        <p>Undetected. Unstoppable. Particle DMA.</p>

        <a href="https://discord.gg/partdma" class="btn">Join Discord</a>
    </div>

</body>
</html>
